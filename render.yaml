services:
  - type: web
    name: tienda-node-whatsapp
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    disk:
      name: tienda-disk
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PERSISTENT_STORAGE_PATH
        value: /var/data
      - key: ADMIN_COOKIE_SECURE
        value: "true"
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
